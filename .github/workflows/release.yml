name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # release-it@20 vs @release-it/conventional-changelog peer (^18||^19); scoped to CI only.
      NPM_CONFIG_LEGACY_PEER_DEPS: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
